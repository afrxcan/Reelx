<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reelx</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="nav-brand" id="nav-brand">
      <span class="brand-icon"><img src="/Pictures/Reelx1.PNG" alt="Reelx Logo" /></span>
    </div>

    <!-- Hamburger — mobile only -->
    <button class="nav-hamburger" id="nav-hamburger" aria-label="Toggle menu">
      <span></span><span></span><span></span>
    </button>

    <!-- Collapsible nav body -->
    <div class="nav-body" id="nav-body">
      <div class="nav-links">
        <button class="nav-btn active" data-filter="trending">Trending</button>
        <button class="nav-btn" data-filter="popular">Popular</button>
        <button class="nav-btn" data-filter="top_rated">Top Rated</button>
        <button class="nav-btn" data-filter="upcoming">Upcoming</button>
      </div>
      <div class="nav-search">
        <input type="text" id="search-input" placeholder="Search movies..." autocomplete="off" />
        <button id="search-btn" aria-label="Search">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
        </button>
      </div>
    </div>
  </nav>

  <!-- HOME VIEW -->
  <div id="home-view">

    <!-- Hero Slideshow -->
    <section class="hero" id="hero-section">

      <!-- Ken Burns backdrop layers — injected by JS -->
      <div class="hero-slides" id="hero-slides"></div>

      <!-- Netflix inline video layer -->
      <div class="hero-video-layer" id="hero-video-layer">
        <iframe id="hero-video-iframe" src="" frameborder="0"
          allow="autoplay; encrypted-media" allowfullscreen></iframe>
      </div>

      <!-- Gradient overlay -->
      <div class="hero-overlay"></div>

      <!-- Video controls (mute + close) -->
      <div class="hero-video-controls" id="hero-video-controls">
        <button class="hero-vid-btn" id="hero-mute-btn" aria-label="Toggle mute">
          <svg id="icon-muted" xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
            <line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/>
          </svg>
          <svg id="icon-unmuted" xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" style="display:none">
            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
            <path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/>
          </svg>
        </button>
        <button class="hero-vid-btn hero-vid-close" id="hero-video-close" aria-label="Close video">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>

      <!-- Text content -->
      <div class="hero-content" id="hero-content">
        <div class="hero-badge">🔥 Trending Now</div>
        <h1 class="hero-title" id="hero-title">Loading...</h1>
        <p class="hero-overview" id="hero-overview"></p>
        <div class="hero-meta" id="hero-meta"></div>
        <div class="hero-actions">
          <button class="btn-primary" id="hero-details-btn">View Details</button>
          <button class="btn-ghost" id="hero-trailer-btn">▶ Trailer</button>
        </div>
      </div>

      <!-- Arrows -->
      <button class="hero-arrow hero-arrow-left" id="hero-prev" aria-label="Previous">
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <button class="hero-arrow hero-arrow-right" id="hero-next" aria-label="Next">
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
      </button>

      <!-- Dots + progress -->
      <div class="hero-dots" id="hero-dots"></div>
      <div class="hero-progress"><div class="hero-progress-bar" id="hero-progress-bar"></div></div>

    </section>

    <div class="section-header">
      <h2 class="section-title" id="section-title">Trending This Week</h2>
      <span class="section-count" id="section-count"></span>
    </div>

    <section class="movie-grid-section">
      <div class="movie-grid" id="movie-grid"></div>
      <div class="loading-spinner" id="loading-spinner">
        <div class="spinner"></div><p>Fetching movies...</p>
      </div>
      <div class="error-state" id="error-state" style="display:none;">
        <span class="error-icon">⚠</span>
        <p id="error-message">Something went wrong.</p>
        <button class="btn-primary" id="retry-btn">Retry</button>
      </div>
    </section>

    <div class="pagination" id="pagination">
      <button class="page-btn" id="prev-page" disabled>← Prev</button>
      <span class="page-info" id="page-info">Page 1</span>
      <button class="page-btn" id="next-page">Next →</button>
    </div>

  </div>

  <!-- DETAIL VIEW -->
  <div id="detail-view" style="display:none;">
    <button class="back-btn" id="back-btn">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/>
      </svg>Back
    </button>
    <div class="detail-hero" id="detail-hero">
      <div class="detail-hero-bg" id="detail-hero-bg"></div>
      <div class="detail-hero-overlay"></div>
      <div class="detail-hero-content">
        <img class="detail-poster" id="detail-poster" src="" alt="" />
        <div class="detail-info">
          <h1 class="detail-title" id="detail-title"></h1>
          <p class="detail-tagline" id="detail-tagline"></p>
          <div class="detail-badges" id="detail-badges"></div>
          <p class="detail-overview" id="detail-overview"></p>
          <div class="detail-stats" id="detail-stats"></div>
          <div class="detail-actions">
            <button class="btn-primary" id="detail-trailer-btn">▶ Watch Trailer</button>
          </div>
        </div>
      </div>
    </div>
    <section class="cast-section">
      <h2 class="cast-heading">Cast</h2>
      <div class="cast-row" id="cast-row"></div>
    </section>
    <section class="more-info-section">
      <div class="info-grid" id="info-grid"></div>
    </section>
    <section class="similar-section">
      <h2 class="cast-heading">Similar Movies</h2>
      <div class="movie-grid similar-grid" id="similar-grid"></div>
    </section>
  </div>

  <!-- TRAILER MODAL -->
  <div class="modal-overlay" id="modal-overlay" style="display:none;">
    <div class="modal-box">
      <button class="modal-close" id="modal-close">✕</button>
      <div class="video-wrapper">
        <iframe id="trailer-iframe" src="" frameborder="0" allowfullscreen
          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"></iframe>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <footer class="footer"><p>Reelx © 2026</p></footer>

  <script type="module" src="app.js"></script>
</body>
</html>
