<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reelx</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ═══════════════════ NAVBAR ═══════════════════ -->
  <nav class="navbar">
    <div class="nav-brand" id="nav-brand">
      <span class="brand-icon"><img src="/Pictures/Reelx1.PNG" alt="Reelx Logo" /></span>
    </div>
    <div class="nav-links">
      <button class="nav-btn active" data-filter="trending">Trending</button>
      <button class="nav-btn" data-filter="popular">Popular</button>
      <button class="nav-btn" data-filter="top_rated">Top Rated</button>
      <button class="nav-btn" data-filter="upcoming">Upcoming</button>
    </div>
    <div class="nav-search">
      <input type="text" id="search-input" placeholder="Search movies..." autocomplete="off" />
      <button id="search-btn" aria-label="Search">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
      </button>
    </div>
  </nav>

  <!-- ═══════════════════ HOME VIEW ═══════════════════ -->
  <div id="home-view">

    <!-- Hero Slideshow -->
    <section class="hero" id="hero-section">

      <!-- Slide layers are injected here by JS -->
      <div class="hero-slides" id="hero-slides"></div>

      <!-- Shared overlay (gradient on top of all slides) -->
      <div class="hero-overlay"></div>

      <!-- Content panel — updated by JS on each slide change -->
      <div class="hero-content" id="hero-content">
        <div class="hero-badge">🔥 Trending Now</div>
        <h1 class="hero-title" id="hero-title">Loading...</h1>
        <p class="hero-overview" id="hero-overview"></p>
        <div class="hero-meta" id="hero-meta"></div>
        <div class="hero-actions">
          <button class="btn-primary" id="hero-details-btn">View Details</button>
          <button class="btn-ghost" id="hero-trailer-btn">▶ Trailer</button>
        </div>
      </div>

      <!-- Arrow controls -->
      <button class="hero-arrow hero-arrow-left" id="hero-prev" aria-label="Previous">
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
      </button>
      <button class="hero-arrow hero-arrow-right" id="hero-next" aria-label="Next">
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
          <polyline points="9 18 15 12 9 6"/>
        </svg>
      </button>

      <!-- Dot indicators -->
      <div class="hero-dots" id="hero-dots"></div>

      <!-- Progress bar -->
      <div class="hero-progress">
        <div class="hero-progress-bar" id="hero-progress-bar"></div>
      </div>

    </section>

    <!-- Section Header -->
    <div class="section-header">
      <h2 class="section-title" id="section-title">Trending This Week</h2>
      <span class="section-count" id="section-count"></span>
    </div>

    <!-- Movie Grid -->
    <section class="movie-grid-section">
      <div class="movie-grid" id="movie-grid">
        <!-- Movie cards injected by JS -->
      </div>
      <div class="loading-spinner" id="loading-spinner">
        <div class="spinner"></div>
        <p>Fetching movies...</p>
      </div>
      <div class="error-state" id="error-state" style="display:none;">
        <span class="error-icon">⚠</span>
        <p id="error-message">Something went wrong.</p>
        <button class="btn-primary" id="retry-btn">Retry</button>
      </div>
    </section>

    <!-- Pagination -->
    <div class="pagination" id="pagination">
      <button class="page-btn" id="prev-page" disabled>← Prev</button>
      <span class="page-info" id="page-info">Page 1</span>
      <button class="page-btn" id="next-page">Next →</button>
    </div>

  </div>

  <!-- ═══════════════════ DETAIL VIEW ═══════════════════ -->
  <div id="detail-view" style="display:none;">

    <button class="back-btn" id="back-btn">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/>
      </svg>
      Back
    </button>

    <!-- Detail Hero -->
    <div class="detail-hero" id="detail-hero">
      <div class="detail-hero-bg" id="detail-hero-bg"></div>
      <div class="detail-hero-overlay"></div>
      <div class="detail-hero-content">
        <img class="detail-poster" id="detail-poster" src="" alt="" />
        <div class="detail-info">
          <h1 class="detail-title" id="detail-title"></h1>
          <p class="detail-tagline" id="detail-tagline"></p>
          <div class="detail-badges" id="detail-badges"></div>
          <p class="detail-overview" id="detail-overview"></p>
          <div class="detail-stats" id="detail-stats"></div>
          <div class="detail-actions">
            <button class="btn-primary" id="detail-trailer-btn">▶ Watch Trailer</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Cast -->
    <section class="cast-section">
      <h2 class="cast-heading">Cast</h2>
      <div class="cast-row" id="cast-row">
        <!-- Cast cards injected by JS -->
      </div>
    </section>

    <!-- Additional Info -->
    <section class="more-info-section">
      <div class="info-grid" id="info-grid">
        <!-- Genres, production, keywords etc -->
      </div>
    </section>

    <!-- Similar Movies -->
    <section class="similar-section">
      <h2 class="cast-heading">Similar Movies</h2>
      <div class="movie-grid similar-grid" id="similar-grid"></div>
    </section>

  </div>

  <!-- ═══════════════════ TRAILER MODAL ═══════════════════ -->
  <div class="modal-overlay" id="modal-overlay" style="display:none;">
    <div class="modal-box">
      <button class="modal-close" id="modal-close">✕</button>
      <div class="video-wrapper">
        <iframe id="trailer-iframe" src="" frameborder="0" allowfullscreen
          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture">
        </iframe>
      </div>
    </div>
  </div>

  <!-- ═══════════════════ TOAST ═══════════════════ -->
  <div class="toast" id="toast"></div>

  <footer class="footer">
    <p>Reelx © 2026</p>
  </footer>

  <script type="module" src="app.js"></script>
</body>
</html>
